[package]
name = "VirtualizedList"
version = "1.5.1"
readme = "README.md"
content_root = "src"
files = [
    "*",
    "!**/__tests__/**",
    "!benchmarks/**",
    "!test-place/**",
    "!testUtils/",
]
publish = true
authors = [
    "Henry Allen <hallen@roblox.com>",
    "Ignacio Falk <flakolefluk@gmail.com>",
    "Allan Jeremy <dev@allanjeremy.com>",
]
[dependencies.Dash]
target = "https://github.com/roblox/dash"
version = "^1.1.0"

[dependencies.LuauPolyfill]
target = "https://github.com/roblox/luau-polyfill"
version = "^1"

[dependencies.Otter]
target = "https://github.com/roblox/otter"
version = "^1.0"

[dependencies.Promise]
target = "https://github.com/roblox/roblox-lua-promise"
version = "^3.3.0"

[dependencies.React]
target = "https://github.com/roblox/roact-alignment"
version = "^17.0.1-rc.19"
[dev_dependencies.Jest]
target = "https://github.com/roblox/jest-roblox"
version = "^3.8.0"

[dev_dependencies.JestGlobals]
target = "https://github.com/roblox/jest-roblox"
version = "^3.8.0"

[dev_dependencies.ReactRoblox]
target = "https://github.com/roblox/roact-alignment"
version = "^17.0.1-rc.19"

[dev_dependencies.ReactShallowRenderer]
target = "https://github.com/roblox/roact-alignment"
version = "^17.0.1-rc.19"

[dev_dependencies.ReactTestRenderer]
target = "https://github.com/roblox/roact-alignment"
version = "^17.0.1-rc.19"

[dev_dependencies.ReactTestingLibrary]
target = "https://github.com/roblox/react-testing-library-lua"
version = "^12.2.0"

[dev_dependencies.ReactTestingUtils]
target = "https://github.com/roblox/react-utils"
version = "^1.3.1"
